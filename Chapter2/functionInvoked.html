<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>This Program is demo of Function Invoked</title>
    <script>
        function myFunction(){
            document.getElementById('demo').innerHTML="Paragraph are chaged when click of button Changed Para !"
        }
    </script>
</head>
<body>
    <h2> Demo javaScript In head </h2>
    <p id="demo"> A Paragraph !</p>
    <button type="button" onclick="myFunction()"> Changed Para</button>
    
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Function invoked in body </title>
</head>
<body>
    <h2> Demo  JavaScript in Body</h2>
    <p id="demo">A Pargaraph</p>

    <button type="button" onclick="myFunction()">Try It</button>

    <script>
        function myFunction(){
            document.getElementById('demo').innerHTML = "A Paragraph can Changed !"
        }
    </script>
</body>
</html>

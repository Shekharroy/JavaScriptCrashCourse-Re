<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript Variables</title>
</head>
<body>
    <h1>JavaScript Variables</h1>
    <p>The underscrode treated as a letter in JavaScript names.</p>
    <p> The JavaScript Doller ($) sign treated as letter in JavaScript name</p>
    <p>Assigning the value in varaible the time of declaration.</p>

    <p id="demo"></p>
    <p id="doller"></p>
    <p id="carname"></p>
    <script>
        let _x = 7;
        let _100 = 3;

        let $ = 2;
        let $$ = 33;
        let $myname = 90;

        const carName = "Volvo";

        document.getElementById("demo").innerHTML = _x + _100;

        document.getElementById("doller").innerHTML = $ + $$ + $myname;

        document.getElementById("carname").innerHTML = carName;
    </script>
</body>
</html>

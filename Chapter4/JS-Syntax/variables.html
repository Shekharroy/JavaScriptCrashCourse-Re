<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Variables</title>
</head>
<body>
    <h1>JavaScript Variables</h1>
    <p>Variables are containers for storing data values.</p>
    <p> let and const keywords create variables</p>
    <p id="demo"></p>

    <script>
       let x = 5; // Now x is equal to 5
       const fname = "John"; // Now fname is equal to "John"
       document.getElementById("demo").innerHTML = fname + " is " + x + " years old."; //Variables are containers for storing data values.
    </script>
    
</body>
</html>

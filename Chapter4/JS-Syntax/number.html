<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript  literals --> fixed value number</title>
</head>
<body>
    <h1>JavaScript Numbers</h1>
    <p>Numbers can be written with or without decimals.</p>
    <p id="demo"></p>

    <script>
        document.getElementById("demo").innerHTML = 123 + "<br>" + 123.50; // Numbers can be written with or without decimals
    </script>     

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Expressions</title>
</head>
<body>
    <h1>JavaScript Expressions</h1>
    <p>An expression is a combination of values, variables, and operators that evaluates to a single value.</p>
    <p id="demo"></p>
    <p id="yamo"></p>
    <p id="sumo"></p>

    

    <script>
        document.getElementById("demo").innerHTML = "5 + 5 = " + (5 + 5);
        var x;
        x = 5;
        document.getElementById("yamo").innerHTML = " x * 5 = " + (x * 5);
        document.getElementById("sumo").innerHTML = "John"+ "" +"Deo";
    </script>
</body>
</html>

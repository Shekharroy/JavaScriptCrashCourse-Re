<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript String</title>
</head>
<body>
    <h1>JavaScript String</h1>
    <p>A string is a sequence of characters in JavaScript.</p>
    <p> String can be written with single quotes, double quotes, or backticks.</p>
    <p id="demo"></p>

    <script>
        document.getElementById("demo").innerHTML = "Hello, World! and John Doe"; //Strings are text, written within double or single quotes:
    </script>

</body>
</html>

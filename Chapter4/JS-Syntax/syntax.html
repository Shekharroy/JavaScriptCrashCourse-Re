<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Syntax</title>
</head>
<body>
    <h1>JavaScript Syntax</h1>
    <p>Javascript is case sensitive</p>
    <p> Try to change lastName to lastname </p>
    <p id="demo"></p>

    <script>
        let lastName = "Doe";
        let lastname = "Peterson";
        document.getElementById("demo").innerHTML = "lastName: " + lastName + ", lastname: " + lastname;
    </script>
</body>
</html>

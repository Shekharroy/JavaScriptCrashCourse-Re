<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment Operators</title>
</head>
<body>
    <h1> The Assignment (=) Operators</h1>
    <p>The = operator is used to assign a value to a variable.</p>
    <p id="demo"></p>

    <script>
        let x= 5;
        let y= 10;
        let sum = x + y;
        document.getElementById("demo").innerHTML = "The sum of x and y is: " + sum;
    </script>


</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Statemnet3</title>
</head>
<body>
    <h1>JavaScript Statemnet3</h1>
    <p>JavaScript code blocks are written between { and }</p>

    <button type="button" onclick="myfunction()">Hi Click me! </button>
    <p id="demo1"></p>
    <p id="demo2"></p>
    <script>
        function myfunction(){
            document.getElementById("demo1").innerHTML = " Hi Dolly.";
            document.getElementById("demo2").innerHTML = " How are you? ";
        }
        
    </script>
</body>
</html>

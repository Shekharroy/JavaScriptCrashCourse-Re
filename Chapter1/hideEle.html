<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Hide HTML Element</title>
</head>
<body>
    <h2>What Can JavaScript Do ?</h2>
    <p id="demo"> JavaScript Can hide the HTML Element on the click button Hide Element</p>

    <button type="button" onclick="document.getElementById('demo').style.display='none'">Hide Element</button>
    
</body>
</html>
